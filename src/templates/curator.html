<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body>
    <h1 style="font-size: x-large; padding-top: 2vh; padding-bottom: 2vh;">
        Welcome {{ .User }} to the Curator Page
    </h1>
    <form style="justify-content: center; align-items: center;">

        {{ range .Iterations }}
            <div class="border-solid border-2 border-gray-400"
            style="padding-bottom: 5vh; padding-top: 2vh; padding-left: 1vw; padding-right: 1vw;
                width: 80vw; margin-left: auto; margin-right: auto; margin-bottom: 2vh;">
                <h3>Song #{{.}}</h3>
                <div class="grid-cols-2" style="position: relative; 
                margin-left: auto; margin-right: auto;
                
                padding-top: 1vh;
                display: grid;">
                    <label for="song-name-{{.}}">Song Name</label>
                    <input type="text" id="song-name-{{.}}">

                    <label for="artist-{{.}}">Artist</label>
                    <input type="text" id="artist-{{.}}">

                    <label for="url-{{.}}">Song YouTube URL</label>
                    <input type="text" id="url-{{.}}">
                    
                </div>
            </div>
            
        {{ end }}
        
    </form>
    <!-- <p>Currently used {{ .Submissions }} number of submissions.</p> -->
</body>

<style>
    body{
        text-align: center;
        align-items: center;
        font-family: 'Times New Roman', Times, serif;
    }
    input{
        border-color: black;
        border-width: 2px;
        border-radius: 2px;
    }
    input:focus{
        border-color: transparent;
    }
</style>

</html>
